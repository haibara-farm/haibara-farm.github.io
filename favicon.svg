    fill="none" stroke="#a0b888" stroke-width="2" stroke-linecap="round"/>

  <!-- 右の峰 -->
  <path d="M36,44 C40,44 43,38 47,32 Q50,28 53,32 C57,38 60,44 62,44"
    fill="none" stroke="#a0b888" stroke-width="2" stroke-linecap="round"/>

  <!-- 中央の主峰（大和富士） -->
  <path d="M10,44 C16,44 22,30 28,18 Q32,12 36,18 C42,30 48,44 54,44"
    fill="none" stroke="#5a7a4a" stroke-width="2.5" stroke-linecap="round"/>

