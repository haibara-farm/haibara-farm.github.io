<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 148" width="200" height="148">
  <defs>
    <style>
      .nm { font-family: 'Yu Mincho','YuMincho','Hiragino Mincho Pro',serif; }
      .sb { font-family: 'Georgia',serif; letter-spacing: 0.3em; }
    </style>
  </defs>

  <!-- 左の峰 -->
  <path d="M24,86 C30,86 38,70 48,56 Q54,48 60,56 C68,70 74,84 80,86"
    fill="none" stroke="#a0b888" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 右の峰 -->
  <path d="M120,86 C126,86 134,70 142,58 Q148,50 154,58 C162,70 168,84 174,86"
    fill="none" stroke="#a0b888" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 中央の主峰 -->
  <path d="M38,86 C54,86 76,50 90,30 Q100,18 110,30 C124,50 146,86 162,86"
    fill="none" stroke="#5a7a4a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 地平線（1本） -->
  <line x1="18" y1="86" x2="182" y2="86" stroke="#c0d0a8" stroke-width="0.8"/>

  <!-- 農園名 -->
  <text x="100" y="112" class="nm" font-size="18" fill="#3a3028" letter-spacing="6" text-anchor="middle">はいばら農園</text>
  <text x="100" y="130" class="sb" font-size="8.5" fill="#a0a888" text-anchor="middle">HAIBARA  FARM</text>
</svg>
